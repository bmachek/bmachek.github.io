<!-- Custom design overrides -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
<link rel="stylesheet" href="{{ 'assets/css/custom.css' | relative_url }}">

<!-- Person entity — site author (referenced by SoftwareApplication and BlogPosting pages) -->
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Person","@id":"https://blog.fokuspunk.de/#person","name":"Bastian Machek","alternateName":"Fokuspunk","url":"https://blog.fokuspunk.de/","sameAs":["https://github.com/bmachek","https://www.instagram.com/fokuspunk/","https://www.fokuspunk.de","https://lrgenius.com"]}
</script>

{% if page.howto %}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"HowTo","name":{{ page.howto.name | jsonify }},"description":{{ page.description | jsonify }},"step":[{% for step in page.howto.steps %}{"@type":"HowToStep","name":{{ step.name | jsonify }},"text":{{ step.text | jsonify }}}{% unless forloop.last %},{% endunless %}{% endfor %}]}
</script>
{% endif %}

{% if page.faq %}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{% for item in page.faq %}{"@type":"Question","name":{{ item.q | jsonify }},"acceptedAnswer":{"@type":"Answer","text":{{ item.a | jsonify }}}}{% unless forloop.last %},{% endunless %}{% endfor %}]}
</script>
{% endif %}
