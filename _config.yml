title: Bastian Machek
tagline: Lightroom Classic plugins for Immich & AI — photography meets free software
description: >-
  Doing stuff with cameras and computers. I write Lightroom Classic plugins for Immich & AI as well software for CIDP patients.

url: "https://blog.fokuspunk.de"

theme: jekyll-theme-chirpy

lang: en

timezone: Europe/Berlin

github:
  username: bmachek # change to your GitHub username

social:
  # Change to your full name.
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: Bastian Machek / Fokuspunk
  email: info@fokuspunk.de
  links:
    # The first element serves as the copyright owner's link
    - https://blog.fokuspunk.de
    - https://www.github.com/bmachek/
    - https://www.instagram.com/fokuspunk/
    - https://www.fokuspunk.de

# Site Verification Settings
webmaster_verifications:
  google: LmZnBMo_vH_VQVoJurzGfgBERKogWJiz7rvahkDEMHI
  bing: D181BCBB540FEED5DBA40405D71CB8E9
  alexa: # fill in your Alexa verification code
  yandex: # fill in your Yandex verification code
  baidu: # fill in your Baidu verification code
